# Default configuration
[default]
log_level = "INFO"

# Development environment
[dev]
log_level = "DEBUG"  # Override default for dev
database = "sqlite:///dev.db"
api_url = "https://dev-api.example.com"

# Staging environment
[staging]
database = "postgresql://staging-server:5432/automation"
api_url = "https://staging-api.example.com"


# Production environment
[prod]
database = "postgresql://prod-server:5432/automation"
api_url = "https://api.example.com"
